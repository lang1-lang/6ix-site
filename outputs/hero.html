<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alter — Dominate Your Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── CARD 0 — Design Tokens (canonical :root) ─────────────────────── */
    :root {
      --ink:     #0A0E1F;
      --ink-2:   #111827;
      --ink-3:   #1E1B4B;
      --muted:   #6B7280;
      --muted-2: #9CA3AF;
      --white:   #FFFFFF;
      --violet-1: #8B5CF6;
      --violet-2: #A855F7;
      --magenta:  #FF3DA8;
      --overlay:  rgba(8, 10, 20, 0.40);

      --container-max: 1200px;
      --container-pad: 32px;
    }

    /* ─── Body Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Geist", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── CARD 1 — Background Layer ─────────────────────────────────────── */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1517090504586-fde19ea6066f?auto=format&fit=crop&w=2400&q=80');
      background-size: cover;
      background-position: center 30%;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .hero-bg-overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      z-index: 1;
    }

    .hero-bg-flare {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        125deg,
        rgba(180, 200, 255, 0.18) 0%,
        rgba(180, 200, 255, 0.05) 22%,
        transparent 45%
      );
      z-index: 2;
    }

    .hero-bg-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        transparent 40%,
        rgba(0, 0, 0, 0.45) 100%
      );
      z-index: 3;
    }

    /* ─── CARD 2 — Nav Bar ───────────────────────────────────────────────── */
    .nav-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: transparent;
      font-family: Inter, "Geist", system-ui, sans-serif;
    }

    .nav-inner {
      max-width: var(--container-max);
      padding: 24px var(--container-pad);
      margin: 0 auto;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .nav-brand {
      display: flex;
      align-items: center;
    }

    .nav-links {
      display: flex;
      flex-direction: row;
      gap: 36px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .nav-links a:hover {
      color: var(--white);
    }

    .nav-cta {
      background: var(--ink-3);
      color: var(--white);
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    .nav-cta:hover {
      filter: brightness(1.06);
    }

    /* ─── CARD 3 — Brand Mark ────────────────────────────────────────────── */
    .brand-mark {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .brand-mark svg {
      display: block;
      flex-shrink: 0;
    }

    .brand-mark-text {
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    /* ─── CARD 4 — Icon Badge + Beam ─────────────────────────────────────── */
    .hero-icon-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 32px;
    }

    .hero-icon-badge {
      position: relative;
      z-index: 2;
      width: 72px;
      height: 72px;
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 12px 32px -8px rgba(0,0,0,0.45), 0 4px 12px -2px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-icon-beam-inner {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 8px;
      height: 180px;
      background: linear-gradient(
        180deg,
        rgba(255,61,168,0) 0%,
        rgba(255,61,168,0.85) 45%,
        rgba(255,61,168,0.95) 70%,
        rgba(255,61,168,0) 100%
      );
      filter: blur(2px);
      z-index: 1;
    }

    .hero-icon-beam-halo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 24px;
      height: 180px;
      background: linear-gradient(
        180deg,
        rgba(255,61,168,0) 0%,
        rgba(255,61,168,0.85) 45%,
        rgba(255,61,168,0.95) 70%,
        rgba(255,61,168,0) 100%
      );
      opacity: 0.35;
      filter: blur(8px);
      z-index: 1;
    }

    /* ─── CARD 5 — Headline ──────────────────────────────────────────────── */
    .hero-headline {
      font-family: Inter, "Geist", system-ui, sans-serif;
      font-size: 88px;
      font-weight: 800;
      line-height: 1.04;
      letter-spacing: -0.025em;
      color: var(--white);
      text-align: center;
      max-width: 720px;
      margin: 0 auto 20px;
    }

    @media (max-width: 1024px) {
      .hero-headline {
        font-size: 72px;
      }
    }

    @media (max-width: 768px) {
      .hero-headline {
        font-size: 56px;
      }
    }

    @media (max-width: 480px) {
      .hero-headline {
        font-size: 44px;
      }
    }

    /* ─── CARD 6 — Subheadline ───────────────────────────────────────────── */
    .hero-sub {
      font-size: 17px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--muted-2);
      text-align: center;
      max-width: 540px;
      margin: 0 auto 36px;
    }

    /* ─── CARD 7 — CTA Buttons ───────────────────────────────────────────── */
    .hero-ctas {
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: center;
      margin-bottom: 48px;
    }

    .btn-primary,
    .btn-secondary {
      padding: 13px 26px;
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
      border-radius: 10px;
      border: none;
      cursor: pointer;
      line-height: 1;
      transition: filter 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--violet-2) 0%, var(--violet-1) 100%);
      box-shadow: 0 4px 14px -4px rgba(139, 92, 246, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn-primary:hover {
      filter: brightness(1.08);
    }

    .btn-secondary {
      background: var(--ink-2);
    }

    .btn-secondary:hover {
      filter: brightness(1.06);
    }

    /* ─── CARD 8 — Trust Line ────────────────────────────────────────────── */
    .hero-trust {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted-2);
      text-align: center;
      margin: 0 auto 24px;
    }

    /* ─── CARD 9 — Logo Strip ────────────────────────────────────────────── */
    .hero-logos {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 64px;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .hero-logos {
        gap: 32px;
      }
    }

    .logo-lockup {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-family: Inter, "Geist", system-ui, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--muted-2);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    /* ─── CARD 10 — Hero Layout ──────────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }

    /* Vertical rhythm — margins live on child elements, set by their cards.
       hero-icon-wrap already has margin-bottom: 32px from card 4.
       hero-headline already has margin: 0 auto 20px from card 5.
       hero-sub already has margin: 0 auto 36px from card 6.
       hero-ctas already has margin-bottom: 48px from card 7.
       hero-trust already has margin: 0 auto 24px from card 8.
       No extra margin needed here. */
  </style>
</head>
<body>
  <section class="hero">

    <!-- Card 1: background layers -->
    <div class="hero-bg"></div>
    <div class="hero-bg-overlay"></div>
    <div class="hero-bg-flare"></div>
    <div class="hero-bg-vignette"></div>

    <!-- Card 2: nav — brand mark from card_3 replaces BRAND_MARK_SLOT -->
    <nav class="nav-bar" aria-label="Main navigation">
      <div class="nav-inner">

        <div class="nav-brand">
          <a href="#" class="brand-mark">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 2 L26 14 L14 26 L2 14 Z" fill="#FFFFFF"/>
              <path d="M14 9 L21 14 L14 19 L7 14 Z" fill="#0A0E1F"/>
            </svg>
            <span class="brand-mark-text">Alter</span>
          </a>
        </div>

        <ul class="nav-links">
          <li><a href="#">Features</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">Changelog</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
        <!-- TODO: mobile nav — replace center <ul> with hamburger menu at <768px -->

        <button class="nav-cta" type="button">Contact Us</button>

      </div>
    </nav>

    <!-- Centered content stack -->
    <div class="hero-content">

      <!-- Card 4: icon badge + beam -->
      <div class="hero-icon-wrap">
        <div class="hero-icon-beam-halo"></div>
        <div class="hero-icon-beam-inner"></div>
        <div class="hero-icon-badge">
          <svg width="32" height="32" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2 L26 14 L14 26 L2 14 Z" fill="#0A0E1F"/>
            <path d="M14 9 L21 14 L14 19 L7 14 Z" fill="#FFFFFF"/>
          </svg>
        </div>
      </div>

      <!-- Card 5: headline -->
      <h1 class="hero-headline">Dominate<br>Your Market.</h1>

      <!-- Card 6: subheadline -->
      <p class="hero-sub">Websites &amp; Lead generation systems across the GTA — We handle the digital, you run the jobs.</p>

      <!-- Card 7: CTA buttons -->
      <div class="hero-ctas">
        <button class="btn-primary">Free Audit</button>
        <button class="btn-secondary">Learn More</button>
      </div>

      <!-- Card 8: trust line -->
      <p class="hero-trust">Adopted by renowned, trusted, and leading enterprises</p>

      <!-- Card 9: logo strip -->
      <div class="hero-logos">

        <!-- 1. Asterisk -->
        <div class="logo-lockup">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="color: var(--muted-2);"
          >
            <g transform="translate(9,9)">
              <g transform="rotate(0)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
              <g transform="rotate(60)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
              <g transform="rotate(120)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
              <g transform="rotate(180)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
              <g transform="rotate(240)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
              <g transform="rotate(300)">
                <rect x="-1" y="-5" width="2" height="10" fill="currentColor" rx="0.5"/>
              </g>
            </g>
          </svg>
          <span class="logo-text">Asterisk</span>
        </div>

        <!-- 2. Oasis — wordmark only -->
        <div class="logo-lockup">
          <span class="logo-text">Oasis</span>
        </div>

        <!-- 3. Ebooks -->
        <div class="logo-lockup">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="color: var(--muted-2);"
          >
            <rect x="1" y="3" width="7" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <rect x="10" y="3" width="7" height="12" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <line x1="9" y1="3" x2="9" y2="15" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span class="logo-text">Ebooks</span>
        </div>

        <!-- 4. Opal -->
        <div class="logo-lockup">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="color: var(--muted-2);"
          >
            <circle cx="9" cy="9" r="7.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <circle cx="9" cy="9" r="3" fill="currentColor"/>
          </svg>
          <span class="logo-text">Opal</span>
        </div>

        <!-- 5. Dunlir -->
        <div class="logo-lockup">
          <svg
            width="18"
            height="18"
            viewBox="0 0 18 18"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            style="color: var(--muted-2);"
          >
            <defs>
              <mask id="crescent-mask">
                <circle cx="9" cy="9" r="7" fill="white"/>
                <circle cx="12" cy="7" r="5.5" fill="black"/>
              </mask>
            </defs>
            <circle cx="9" cy="9" r="7" fill="currentColor" mask="url(#crescent-mask)"/>
          </svg>
          <span class="logo-text">Dunlir</span>
        </div>

      </div><!-- /.hero-logos -->

    </div><!-- /.hero-content -->

  </section>
</body>
</html>
