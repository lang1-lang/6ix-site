<style>
  /* CARD 0 — Design Tokens (canonical :root, shared by all cards) */
  :root {
    --ink:     #0A0E1F;
    --ink-2:   #111827;
    --ink-3:   #1E1B4B;
    --muted:   #6B7280;
    --muted-2: #9CA3AF;
    --white:   #FFFFFF;
    --violet-1: #8B5CF6;
    --violet-2: #A855F7;
    --magenta:  #FF3DA8;
    --overlay:  rgba(8, 10, 20, 0.40);

    --container-max: 1200px;
    --container-pad: 32px;
  }

  /* CARD 1 — Background Layer */

  /* Full-bleed Toronto night photo — CN Tower visible, centered */
  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1517090504586-fde19ea6066f?auto=format&fit=crop&w=2400&q=80');
    background-size: cover;
    background-position: center 30%;
    background-repeat: no-repeat;
    z-index: 0;
  }

  /* Overlay 1 — uniform darkening via --overlay token */
  .hero-bg-overlay {
    position: absolute;
    inset: 0;
    background: var(--overlay);
    z-index: 1;
  }

  /* Overlay 2 — diagonal light ray from upper-left */
  .hero-bg-flare {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      125deg,
      rgba(180, 200, 255, 0.18) 0%,
      rgba(180, 200, 255, 0.05) 22%,
      transparent 45%
    );
    z-index: 2;
  }

  /* Overlay 3 — radial vignette, pulls edges to near-black */
  .hero-bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at center,
      transparent 40%,
      rgba(0, 0, 0, 0.45) 100%
    );
    z-index: 3;
  }
</style>

<!-- CARD 1 markup — four full-bleed layers, lowest→highest z-index -->
<div class="hero-bg"></div>
<div class="hero-bg-overlay"></div>
<div class="hero-bg-flare"></div>
<div class="hero-bg-vignette"></div>
